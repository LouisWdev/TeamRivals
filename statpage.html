<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Statistieken - Rivals Track</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap-grid.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap-reboot.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap-utilities.css" />
    <link rel="stylesheet" href="./assets/css/master.css" />
    <link rel="stylesheet" href="./assets/css/statPage.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">Rivals Track</div>
      <div class="nav-links">
        <a href="#">Lore</a>
        <a href="#">Heroes</a>
        <a href="#" class="btn-yellow">Log In</a>
      </div>
    </nav>

    <main class="container stats-page">
      <h1>Live Statistieken</h1>

      <section class="stat-group">
        <h2>Spel statistieken</h2>
        <div class="centered-placeholder">[Aantal spelers graph]</div>
        <div class="centered-placeholder text-only">
          <p>[Sezoen Titel]</p>
          <p>[Sezoen countdown]</p>
        </div>
      </section>

      <section class="stat-group">
        <h2>Speler Statistieken</h2>
        <div class="centered-placeholder">[Meest gespeelde held]</div>
        <div class="centered-placeholder">[Meest verbande held]</div>
      </section>

      <section class="stat-group search-section">
        <h2>Geef je usernaam in</h2>
        <div class="input-row">
          <label for="player-search">Speler:</label>
          <input type="text" id="player-search" name="player-search" />
        </div>
        <div class="centered-placeholder results-area">
          [Details van ingevoerde speler]
        </div>
      </section>
    </main>
  </body>
</html>
