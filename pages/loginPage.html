<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rivals Track - Login</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap-grid.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap-reboot.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap-utilities.css" />
    <link rel="stylesheet" href="../assets/css/master.css" />
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="#" class="nav-logo">Rivals Track</a>
    </nav>

    <main class="login-container">
      <form class="login-card">
        <div class="input-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" />
        </div>

        <div class="input-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" />
        </div>

        <button type="button" class="btn login-button" onclick="handleLogin()">Log in</button>
        <p id="login-error" style="color:red; display:none;">Invalid email or password.</p>
      </form>
    </main>
    <script src="../../js/script.js"></script>
  </body>
</html>
