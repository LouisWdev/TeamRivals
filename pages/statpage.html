<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Statistieken - Rivals Track</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap-grid.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap-reboot.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap-utilities.css" />
    <link rel="stylesheet" href="../assets/css/master.css" />
    <link rel="stylesheet" href="../assets/css/statPage.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <a href="../pages/landing.html" class="nav-logo">Rivals Track</a>
        <div class="nav-links">
          <a href="heroes.html">Helden</a>
          <a href="loginPage.html" class="btn-yellow">Log In</a>
        </div>
      </nav>
    </header>

    <main class="container stats-page">
      <h1>Live Statistieken</h1>

      <section class="stat-group">
        <h2>Spel statistieken</h2>
        <div class="centered-placeholder" id="hero-count-stat"></div>
      </section>

      <section class="stat-group search-section">
        <h2>Geef je usernaam in</h2>
        <div class="input-row">
          <input
            type="text"
            id="player-search"
            name="player-search"
            placeholder="Search a player..."
            autocomplete="off"
          />
          <button id="search-btn">Search</button>
        </div>
        <div class="centered-placeholder results-area"></div>
      </section>

      <section class="stat-group">
        <h2>Uitgelichte Helden</h2>
        <div class="featured-heroes-row" id="featured-heroes"></div>
      </section>
    </main>
    <script src="../js/navbar.js"></script>
    <script src="../js/stats.js"></script>
  </body>
</html>
